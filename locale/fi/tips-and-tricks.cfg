[tips-and-tricks-item-description]
cube-ultracube=Tässä osiossa on ultrakuutiolle ominaisia vinkkejä ja niksejä.
cube-vanilla=Tässä osiossa on vaniljapelin vinkkejä ja niksejä.

cube-boiler=Aloittaaksesi Ultracubessa sinun on tuotettava tehtaallesi virtaa [entity=cube-boiler] avulla, mutta se toimii hieman eri tavalla kuin normaalisti.\n\nSe saa polttoaineensa [item=cube-ultradense-utility-cube] ja pystyy kiehauttamaan [fluid=water] nopeasti tuottaen suuria määriä [fluid=steam].\n\nKuten monien muiden Ultracuben koneiden kohdalla, kattilan ei tarvitse (eikä olla toivottavaa) toimia jatkuvasti. Kattilan yhden käyttökerran pitäisi tuottaa riittävästi varastoitua [fluid=steam] tehtaan virransyöttöön jonkin aikaa. [entity=storage-tank] voidaan käyttää [fluid=water] ja [fluid=steam] varastointiin ja sen varmistamiseen, että [item=cube-ultradense-utility-cube] käytetään nopeasti sen sijaan, että se jäisi puolitiehen jumiin sisälle. Huomaa kuitenkin, että liiallinen puskurointi voi aiheuttaa omia läpäisyongelmia.\n\nTäyden kapasiteetin saavuttamiseksi saatetaan tarvita [entity=pump].\n\nJos [item=cube-ultradense-utility-cube] juuttuu sisälle, voit poimia [entity=cube-boiler] saadaksesi [item=cube-dormant-utility-cube]. Sama toimii minkä tahansa muun vastaavan koneen tai ajoneuvon kanssa.
cube-efficiency=Ultracubea ei ole suunniteltu aiheuttamaan liiallista grindausta tai pitkää joutilaana olemista. Jos joudut odottamaan paljon tuotteiden valmistumista, on todennäköistä, että tehtaaseesi voitaisiin tehdä suunnitteluparannuksia.\n\nPerus-Factoriosta poiketen tehtaan kokonaistuotantoa eivät lopulta rajoita koneet tai resurssit, vaan [item=cube-ultradense-utility-cube] käyttötehokkuus.\n\nVoi olla hyödyllistä ajatella "tuotosta kuutioaikayksikköä kohti".\n\nJoitakin asioita, joita kannattaa harkita, ovat:\n- Kuinka [item=cube-ultradense-utility-cube] saadaan paikasta toiseen.\n- Kuinka määritetään, milloin prosessi voi käyttää [item=cube-ultradense-utility-cube] pysähtymättä, ja automatisoidaan toimitus, kun se voi.\n- Erilaisia ​​tapoja järjestää koneita ja prosesseja yleiskulujen, kuten [item=fast-transport-belt] läpikulkuajan, vähentämiseksi.\n\nTuotosten puskurointi voi helpottaa joitakin ongelmia, mutta muista, että liiallinen puskurointi voi peittää ongelmia ja vaikeuttaa ongelmien diagnosointia, kun niitä ilmenee.\n\nLopuksi on huomattava, että vaihtoehtoiset prosessit ja reseptit, jotka lopulta löydät, ovat harvoin suora päivitys. Usein kuutiotehokkuuden parannukset tulevat resurssitehokkuuden heikkenemisen tai monimutkaisuuden lisääntymisen kustannuksella. Sinun pitää harkita, milloin (ja missä määrin) vaihdat niihin.
cube-ultralocomotion=[technology=cube-transitive-ultralocomotion] saa [item=cube-ultradense-utility-cube] ajoneuvon kiihtyvyys- ja huippunopeusbonukset voimaan myös junan [entity=cargo-wagon], ei vain [entity=locomotive] polttoainetta käytettäessä.\n\nTämä mahdollistaa kuution tehokkaan automatisoidun nopean kuljetuksen pitkillä matkoilla, koska [entity=fast-inserter] voi helposti poistaa kuution määränpäähänsä saavuttuaan.\n\nJokaisella [entity=locomotive] on edelleen oltava oma polttoaineensa lähde, kuten esimerkiksi [item=cube-vehicle-fuel].
cube-deep-core-ore=[item=cube-deep-core-ore] löytyy [entity=cube-deep-core-vein] ja sitä voi louhia [entity=cube-deep-core-ultradrill], jonka on saatava voimansa [item=cube-ultradense-utility-cube].\n\n[entity=cube-deep-core-vein] ovat harvinaisia, eikä niitä todennäköisesti löydy läheltä. Tarvittaessa [entity=car] käyttäen [item=cube-ultradense-utility-cube] polttoaineena voi nopeuttaa tiedustelutehtävääsi.
cube-nuclear-reactor=Ultracuben [entity=cube-nuclear-reactor] on käynnistettävä [item=cube-ultradense-utility-cube].\n\nYksittäisen kuution käyttäminen polttoaineena nostaa reaktorin käyttölämpötilaan, jolloin reaktorin lämpöliitännät yhdistyvät, jolloin lämpö pääsee virtaamaan ulos, ja [item=uranium-fuel-cell] voidaan asettaa normaalin toiminnan jatkamiseksi.\n\nJos reaktorin [item=uranium-fuel-cell] loppuu milloin tahansa, se palaa alkuperäiseen tilaansa ja se on käynnistettävä uudelleen [item=cube-ultradense-utility-cube].
cube-mystery-furnace=Kun [entity=cube-mystery-furnace] saa polttoainetta [item=cube-haunted-energy-cell], minkä tahansa sinne asetetun esineen voi uhrata hengille saadakseen vastineeksi jonkin esineen.\n\nHenget ovat oikukkaita ja vaikeasti miellytettäviä, mutta riittävällä sinnikkyydellä saatat saada jotain mukavaa mukaasi.\n\nVaihtoehtoisesti voit käyttää sitä päästäksesi eroon hankaluuksistasi.\n\nOle varovainen, sillä henget ottavat mielellään vastaan ​​myös [item=cube-haunted-energy-cell], ja aina muista hallita sinun [item=cube-residual-tendrils].
cube-quantum-decoder=[entity=cube-quantum-decoder] toimii melko eri tavalla kuin useimmat koneet.\n\nSe voi käyttää mitä tahansa seuraavista:\n- [item=cube-qubit-0]\n- [item=cube-qubit-1]\n- [item=cube-qubit-2]\n- [item=cube-qubit-3]\n- [item=cube-qubit-4]\n- [item=cube-qubit-5]\n\nNämä esineet kulutetaan yksi kerrallaan, mutta käsitellään pareittain, ja tulos syntyy joka toisen syötteen jälkeen. Tuloksen saaminen riippuu siitä, oliko käsitelty kubittipari oikein vai ei: [item=cube-qubit] väärän parituksen yhteydessä tai [item=cube-quantum-research-data] oikean parituksen yhteydessä.\n\nKubittien oikea paritus määritetään satunnaisesti jokaiselle [entity=cube-quantum-decoder] (yksilöllisesti), ja se muuttuu satunnaisesti tietylle ratkaisimelle joka kerta, kun se ratkaisee onnistuneesti.\n\nHuomaa, että:\n- Järjestyksellä ei ole väliä: [item=cube-qubit-0] ja sen jälkeen [item=cube-qubit-1] lisääminen on sama kuin [item=cube-qubit-1] ja sen jälkeen [item=cube-qubit-0] lisääminen.\n- Kahden saman kubitin kopiot on kelvollinen paritus.\n\nMahdollisia parituksia on siis 21, ja jokainen niistä on yhtä todennäköinen.
cube-helvetica-scenario=Jos olet päättänyt niin, [entity=cube-forbidden-ziggurat] voidaan suorittaa [recipe=cube-resonance-cascade].\n\nVarmista, että ymmärrät riskit: olisi viisasta tehdä tarvittavat järjestelyt etukäteen.\n\nHuomaa, että [item=cube-productivity-module] tuottavat ainoastaan lisää [item=cube-basic-antimatter-unit].


